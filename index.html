<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no,
viewport-fit=cover">

<title>Open In Browser</title>

<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html,
body{

width:100%;
height:100%;

overflow:hidden;

font-family:'Patrick Hand',cursive;

background:#d9b7b8;

}

/* BACKGROUND */

.bg{

position:fixed;
inset:0;

background:
linear-gradient(
to bottom,
rgba(217,183,184,.72),
rgba(217,183,184,.84)
),
url('assets/bg1.jpg');

background-size:cover;
background-position:center;
background-repeat:no-repeat;

animation:bgZoom 14s ease-in-out infinite alternate;

transform:scale(1.03);

z-index:1;

}

@keyframes bgZoom{

from{
transform:scale(1.03);
}

to{
transform:scale(1.08);
}

}

/* GLOW */

.glow{

position:fixed;

width:420px;
height:420px;

background:
rgba(255,255,255,.12);

filter:blur(100px);

border-radius:50%;

top:50%;
left:50%;

transform:
translate(-50%,-50%);

z-index:2;

pointer-events:none;

}

/* WRAPPER */

.wrapper{

position:relative;

z-index:3;

width:100%;
height:100%;

display:flex;
justify-content:center;
align-items:center;

padding:26px;

}

/* CARD */

.card{

width:100%;
max-width:420px;

text-align:center;

animation:fadeUp .8s ease;

}

@keyframes fadeUp{

from{
opacity:0;
transform:
translateY(24px);
}

to{
opacity:1;
transform:
translateY(0);
}

}

/* LOGO */

.logo{

font-size:56px;

color:white;

margin-bottom:18px;

text-shadow:
0 2px 12px rgba(0,0,0,.12);

}

/* DESCRIPTION */

.desc{

font-size:24px;

line-height:1.45;

color:
rgba(255,255,255,.94);

margin-bottom:38px;

}

/* STEPS */

.steps{

display:flex;
flex-direction:column;

gap:16px;

margin-bottom:38px;

}

.step{

display:flex;
align-items:center;

gap:16px;

text-align:left;

font-size:21px;

color:
rgba(255,255,255,.92);

}

.num{

width:46px;
height:46px;

min-width:46px;

border-radius:15px;

background:
rgba(255,255,255,.16);

display:flex;
justify-content:center;
align-items:center;

font-size:22px;

backdrop-filter:
blur(10px);

}

/* BUTTON */

.cta{

width:100%;
height:66px;

border:none;

border-radius:28px;

background:white;

font-family:'Patrick Hand',cursive;

font-size:28px;

color:#111;

box-shadow:
0 12px 34px rgba(0,0,0,.16);

transition:
transform .18s ease,
opacity .18s ease;

cursor:pointer;

}

.cta:active{

transform:scale(.97);

}

/* FOOTER */

.footer{

position:fixed;

bottom:24px;

left:0;

width:100%;

text-align:center;

font-size:16px;

color:
rgba(255,255,255,.72);

z-index:4;

}

/* MOBILE */

@media(max-width:480px){

.logo{
font-size:44px;
}

.desc{
font-size:18px;
}

.step{
font-size:17px;
}

.cta{
height:60px;
font-size:24px;
}

}

/* SAFE AREA */

@supports(padding:max(0px)){

.wrapper{

padding-top:
max(26px,
env(safe-area-inset-top));

padding-bottom:
max(26px,
env(safe-area-inset-bottom));

}

}

</style>
</head>
<body>

<div class="bg"></div>

<div class="glow"></div>

<div class="wrapper">

<div class="card">

<div class="logo">
Veloura
</div>

<div class="desc">
Open this page in your browser to continue
</div>

<div class="steps">

<div class="step">
<div class="num">1</div>
<div>Tap ⋮ in the top right</div>
</div>

<div class="step">
<div class="num">2</div>
<div>Select “Open in Browser”</div>
</div>

</div>

<button
class="cta"
id="openBrowserBtn">

Open in browser

</button>

</div>
</div>

<div class="footer">
Protected browser session
</div>

<script>

/* DEVICE DETECT */

const ua =
navigator.userAgent.toLowerCase();

const isAndroid =
ua.includes('android');

const isIOS =
/iphone|ipad|ipod/.test(ua);

/* BUTTON */

document
.getElementById(
'openBrowserBtn'
)
.addEventListener(
'click',
()=>{

const target =
window.location.origin +
'/verify.html';

/* ANDROID */

if(isAndroid){

const clean =
target.replace(
/^https?:\/\//,''
);

window.location.href =
'intent://' +
clean +
'#Intent;scheme=https;package=com.android.chrome;end';

/* FALLBACK */

setTimeout(()=>{

window.location.href =
target;

},1800);

}

/* IOS */

else if(isIOS){

window.location.href =
target;

}

/* DESKTOP */

else{

window.location.href =
target;

}

}
);

/* BACK LOCK */

history.pushState(
{},
''
);

window.onpopstate =
function(){

history.pushState(
{},
''
);

};

</script>

</body>
</html>
