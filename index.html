<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>

<title>Open In Browser</title>

<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:'Patrick Hand',cursive;
    background:#d7b3b7;
}

/* BACKGROUND */
.bg{
    position:fixed;
    inset:0;
    background:
    linear-gradient(
        to bottom,
        rgba(215,179,183,.82),
        rgba(215,179,183,.88)
    ),
    url('assets/bg1.jpg') center center/cover no-repeat;

    z-index:1;

    transform:scale(1.03);

    animation:bgZoom 12s ease-in-out infinite alternate;
}

@keyframes bgZoom{
    from{
        transform:scale(1.03);
    }
    to{
        transform:scale(1.08);
    }
}

/* MAIN */
.wrapper{
    position:relative;
    z-index:2;

    width:100%;
    height:100%;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:24px;
}

.card{
    width:100%;
    max-width:420px;

    text-align:center;

    animation:fadeUp .8s ease;
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.logo{
    font-size:54px;
    color:#fff;

    margin-bottom:18px;

    text-shadow:0 2px 10px rgba(0,0,0,.12);
}

.desc{
    color:rgba(255,255,255,.94);

    font-size:24px;
    line-height:1.4;

    margin-bottom:34px;
}

.steps{
    display:flex;
    flex-direction:column;
    gap:16px;

    margin-bottom:38px;
}

.step{
    display:flex;
    align-items:center;
    gap:16px;

    text-align:left;

    color:rgba(255,255,255,.92);

    font-size:20px;
}

.num{
    width:44px;
    height:44px;

    min-width:44px;

    border-radius:14px;

    background:rgba(255,255,255,.16);

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:22px;
    color:#fff;

    backdrop-filter:blur(8px);
}

.cta{
    width:100%;
    height:68px;

    border:none;
    border-radius:26px;

    background:#ffffff;
    color:#000;

    font-family:'Patrick Hand',cursive;
    font-size:28px;

    cursor:pointer;

    box-shadow:
    0 10px 30px rgba(0,0,0,.18),
    inset 0 1px 0 rgba(255,255,255,.7);

    transition:.22s;
}

.cta:active{
    transform:scale(.97);
}

.footer{
    position:fixed;
    bottom:24px;

    width:100%;

    text-align:center;

    z-index:3;

    color:rgba(255,255,255,.8);

    font-size:18px;
}

/* TOP NOTICE */
.notice{
    position:fixed;
    top:22px;
    left:50%;

    transform:translateX(-50%);

    background:rgba(255,255,255,.16);

    backdrop-filter:blur(10px);

    border:1px solid rgba(255,255,255,.18);

    color:#fff;

    padding:10px 18px;

    border-radius:18px;

    font-size:15px;

    z-index:10;

    animation:fadeNotice 3s ease forwards;
}

@keyframes fadeNotice{
    0%{
        opacity:0;
        transform:translate(-50%,-10px);
    }

    10%{
        opacity:1;
        transform:translate(-50%,0);
    }

    90%{
        opacity:1;
    }

    100%{
        opacity:0;
    }
}

/* MOBILE */
@media(max-width:480px){

.logo{
    font-size:42px;
}

.desc{
    font-size:18px;
}

.step{
    font-size:17px;
}

.cta{
    height:62px;
    font-size:24px;
}

}
</style>
</head>
<body>

<div class="bg"></div>

<div class="notice" id="notice">
    Secure browser access enabled
</div>

<div class="wrapper">

    <div class="card">

        <div class="logo">
            Veloura
        </div>

        <div class="desc">
            Open this page in your browser to continue
        </div>

        <div class="steps">

            <div class="step">
                <div class="num">1</div>
                <div>Tap ⋮ in the top right</div>
            </div>

            <div class="step">
                <div class="num">2</div>
                <div>Select “Open in Browser”</div>
            </div>

        </div>

        <button class="cta" id="openBrowserBtn">
            Open in browser
        </button>

    </div>

</div>

<div class="footer">
    Protected session
</div>

<script>

/* DETECT */
const ua = navigator.userAgent.toLowerCase();

const isInstagram =
ua.includes("instagram");

const isAndroid =
ua.includes("android");

const isIOS =
/iphone|ipad|ipod/.test(ua);

/* BUTTON */
document
.getElementById("openBrowserBtn")
.addEventListener("click",()=>{

    /* ANDROID */
    if(isAndroid){

        alert("Tap ⋮ → Open in browser");

    }

    /* IOS */
    else if(isIOS){

        alert("Tap Share → Open in Safari");

    }

    /* DESKTOP */
    else{

        window.location.href =
        "verify.html";

    }

});

/* BACK LOCK */
history.pushState(null,null,location.href);

window.onpopstate = function(){

    history.pushState(null,null,location.href);

};

</script>

</body>
</html>
