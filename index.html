<!DOCTYPE html>
Open this page in your browser to continue
</div>

<div class="step">
<div class="num">1</div>
<div>Tap ⋮ in the top right</div>
</div>

<div class="step">
<div class="num">2</div>
<div>Select “Open in Browser”</div>
</div>

<button class="btn" onclick="openBrowser()">
Open in browser
</button>

</div>
</div>

<div class="modal" id="modal">
<div class="modal-box">
<div class="modal-title">Open External Browser</div>
<div class="modal-text">
This website wants to open your browser.
Would you like to continue?
</div>
<div class="actions">
<button onclick="closeModal()">Cancel</button>
<button onclick="continueOpen()">Continue</button>
</div>
</div>
</div>

<script>
const NEXT_PAGE = 'verify.html';

const ua = navigator.userAgent;
const isAndroid = /Android/i.test(ua);
const isIOS = /iPhone|iPad|iPod/i.test(ua);

function openBrowser(){
document.getElementById('modal').style.display='flex';
}

function closeModal(){
document.getElementById('modal').style.display='none';
}

function continueOpen(){

const target = window.location.origin + window.location.pathname.replace('index.html','') + NEXT_PAGE;

if(isAndroid){

const clean = target.replace(/^https?:\/\//,'');

window.location.href =
'intent://' + clean + '#Intent;scheme=https;package=com.android.chrome;end';

setTimeout(()=>{
window.location.href = target;
},1800);

}
else if(isIOS){
window.location.href = target;
}
else{
window.location.href = target;
}
}

history.pushState({},'');
window.onpopstate=function(){
document.getElementById('modal').style.display='flex';
}
</script>

</body>
</html>
