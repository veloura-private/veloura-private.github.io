<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>

<title>Open In Browser</title>

<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:'Patrick Hand',cursive;
    background:#d7b3b7;
}

/* BACKGROUND */
.bg{
    position:fixed;
    inset:0;
    background:
    linear-gradient(
        to bottom,
        rgba(215,179,183,.80),
        rgba(215,179,183,.88)
    ),
    url('assets/bg1.jpg') center center/cover no-repeat;
    z-index:1;
    transform:scale(1.03);
    animation:bgZoom 12s ease-in-out infinite alternate;
}

@keyframes bgZoom{
    from{
        transform:scale(1.03);
    }
    to{
        transform:scale(1.08);
    }
}

/* MAIN */
.wrapper{
    position:relative;
    z-index:2;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:24px;
}

.card{
    width:100%;
    max-width:420px;
    text-align:center;
    animation:fadeUp .8s ease;
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(25px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.logo{
    font-size:54px;
    color:#fff;
    margin-bottom:18px;
    text-shadow:0 2px 10px rgba(0,0,0,.12);
}

.desc{
    color:rgba(255,255,255,.92);
    font-size:24px;
    line-height:1.4;
    margin-bottom:34px;
}

.steps{
    display:flex;
    flex-direction:column;
    gap:16px;
    margin-bottom:36px;
}

.step{
    display:flex;
    align-items:center;
    gap:16px;
    justify-content:flex-start;
    color:rgba(255,255,255,.92);
    font-size:20px;
    text-align:left;
}

.num{
    width:44px;
    height:44px;
    min-width:44px;
    border-radius:14px;
    background:rgba(255,255,255,.16);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
    color:#fff;
    backdrop-filter:blur(6px);
}

.cta{
    width:100%;
    height:72px;
    border:none;
    border-radius:28px;
    background:#ffffff;
    color:#000;
    font-family:'Patrick Hand',cursive;
    font-size:30px;
    cursor:pointer;
    box-shadow:
    0 10px 30px rgba(0,0,0,.18),
    inset 0 1px 0 rgba(255,255,255,.8);

    transition:.25s;
}

.cta:active{
    transform:scale(.97);
}

.footer{
    position:fixed;
    bottom:24px;
    width:100%;
    text-align:center;
    z-index:3;
    color:rgba(255,255,255,.8);
    font-size:18px;
}

/* MODAL */
.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.42);
    backdrop-filter:blur(6px);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:24px;
    z-index:999;
    opacity:0;
    pointer-events:none;
    transition:.25s;
}

.modal.show{
    opacity:1;
    pointer-events:auto;
}

.modal-box{
    width:100%;
    max-width:700px;
    background:#2f2f31;
    border-radius:34px;
    padding:34px;
    color:#fff;
    box-shadow:0 20px 60px rgba(0,0,0,.45);
    animation:modalIn .28s ease;
}

@keyframes modalIn{
    from{
        opacity:0;
        transform:translateY(20px) scale(.96);
    }
    to{
        opacity:1;
        transform:translateY(0) scale(1);
    }
}

.modal-title{
    font-size:28px;
    margin-bottom:22px;
}

.modal-text{
    font-size:22px;
    line-height:1.5;
    color:rgba(255,255,255,.88);
}

.modal-actions{
    margin-top:36px;
    display:flex;
    justify-content:flex-end;
    gap:18px;
}

.modal-btn{
    border:none;
    background:none;
    color:#6ea8ff;
    font-size:24px;
    font-family:'Patrick Hand',cursive;
    cursor:pointer;
}

/* MOBILE */
@media(max-width:480px){

.logo{
    font-size:42px;
}

.desc{
    font-size:18px;
}

.step{
    font-size:17px;
}

.cta{
    height:64px;
    font-size:24px;
    border-radius:24px;
}

.modal-box{
    border-radius:28px;
    padding:28px;
}

.modal-title{
    font-size:22px;
}

.modal-text{
    font-size:18px;
}

.modal-btn{
    font-size:22px;
}

}
</style>
</head>
<body>

<div class="bg"></div>

<div class="wrapper">

    <div class="card">

        <div class="logo">
            Veloura
        </div>

        <div class="desc">
            Open this page in your browser to continue
        </div>

        <div class="steps">

            <div class="step">
                <div class="num">1</div>
                <div>Tap ⋮ in the top right</div>
            </div>

            <div class="step">
                <div class="num">2</div>
                <div>Select “Open in Browser”</div>
            </div>

        </div>

        <button class="cta" id="openBrowserBtn">
            Open in browser
        </button>

    </div>

</div>

<div class="footer">
    Secure browser access
</div>

<!-- ANDROID STYLE MODAL -->
<div class="modal" id="browserModal">

    <div class="modal-box">

        <div class="modal-title">
            Open External Browser
        </div>

        <div class="modal-text">
            This website wants to open your browser.
            Would you like to continue?
        </div>

        <div class="modal-actions">

            <button class="modal-btn" id="cancelBtn">
                Cancel
            </button>

            <button class="modal-btn" id="continueBtn">
                Continue
            </button>

        </div>

    </div>

</div>

<script>

/* DETECT */
const ua = navigator.userAgent.toLowerCase();

const isInstagram =
    ua.includes("instagram");

const isAndroid =
    ua.includes("android");

const isIOS =
    /iphone|ipad|ipod/.test(ua);

/* ELEMENT */
const modal =
    document.getElementById("browserModal");

/* CTA */
document
.getElementById("openBrowserBtn")
.addEventListener("click",()=>{

    if(isInstagram){

        modal.classList.add("show");

    }else{

        window.location.href="verify.html";

    }

});

/* CANCEL */
document
.getElementById("cancelBtn")
.addEventListener("click",()=>{

    modal.classList.remove("show");

});

/* CONTINUE */
document
.getElementById("continueBtn")
.addEventListener("click",()=>{

    if(isAndroid){

        window.location.href =
        "intent://" +
        window.location.host +
        "/verify.html#Intent;" +
        "scheme=https;" +
        "package=com.android.chrome;" +
        "end";

    }

    else if(isIOS){

        window.location.href =
        window.location.origin +
        "/verify.html";

    }

    else{

        window.location.href =
        "verify.html";

    }

});

/* BACK BUTTON */
history.pushState(null,null,location.href);

window.onpopstate = function(){

    modal.classList.add("show");

    history.pushState(null,null,location.href);

};

</script>

</body>
</html>
