<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta
http-equiv="X-UA-Compatible"
content="IE=edge">

<meta
name="theme-color"
content="#d9b7b8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no,
viewport-fit=cover">

<title>Open In Browser</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link rel="preload"
as="image"
href="assets/bg1.webp"
fetchpriority="high">

<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html,
body{

width:100%;
height:100%;

overflow-x:hidden;

font-family:
'Patrick Hand',
cursive;

background:#d9b7b8;

touch-action:manipulation;

}

/* BG */

.bg{

position:fixed;
inset:0;

overflow:hidden;

z-index:1;

}

.bg::before{

content:'';

position:absolute;
inset:0;

background:
linear-gradient(
to bottom,
rgba(217,183,184,.70),
rgba(217,183,184,.84)
),
url('assets/bg1.webp');

background-size:cover;
background-position:center;
background-repeat:no-repeat;

filter:blur(4px);

transform:
scale(1.08);

animation:
bgZoom 22s linear infinite alternate;

will-change:
transform;

}

@keyframes bgZoom{

from{
transform:
scale(1.03)
translateZ(0);
}

to{
transform:
scale(1.08)
translateZ(0);
}

}

/* GLOW */

.glow{

position:fixed;

width:420px;
height:420px;

background:
rgba(255,255,255,.12);

filter:blur(100px);

border-radius:50%;

top:50%;
left:50%;

transform:
translate(-50%,-50%);

pointer-events:none;

z-index:2;

}

/* WRAPPER */

.wrapper{

position:relative;

z-index:3;

width:100%;
min-height:100dvh;

display:flex;
justify-content:center;
align-items:center;

padding:26px;

}

/* CARD */

.card{

width:100%;
max-width:420px;

text-align:center;

transform:translateZ(0);

will-change:
transform,
opacity;

animation:
fadeUp .8s ease;

}

@keyframes fadeUp{

from{
opacity:0;
transform:
translateY(24px);
}

to{
opacity:1;
transform:
translateY(0);
}

}

/* LOGO */

.logo{

font-size:56px;

color:white;

margin-bottom:18px;

text-shadow:
0 2px 14px rgba(0,0,0,.12);

}

/* DESC */

.desc{

font-size:24px;

line-height:1.45;

color:
rgba(255,255,255,.94);

margin-bottom:38px;

}

/* STEPS */

.steps{

display:flex;
flex-direction:column;

gap:16px;

margin-bottom:38px;

}

.step{

display:flex;
align-items:center;

gap:16px;

text-align:left;

font-size:21px;

color:
rgba(255,255,255,.92);

}

/* NUMBER */

.num{

width:46px;
height:46px;

min-width:46px;

border-radius:15px;

background:
rgba(255,255,255,.16);

display:flex;
justify-content:center;
align-items:center;

font-size:22px;

backdrop-filter:
blur(10px);

}

/* CTA */

.cta{

width:100%;
height:66px;

border:none;

border-radius:28px;

background:white;

font-family:
'Patrick Hand',
cursive;

font-size:28px;

color:#111;

cursor:pointer;

user-select:none;
-webkit-user-select:none;

box-shadow:
0 12px 34px rgba(0,0,0,.16);

transition:
transform .18s ease,
opacity .18s ease;

}

.cta:hover{

transform:
translateY(-2px);

}

.cta:active{

transform:
scale(.97);

}

/* FOOTER */

.footer{

margin-top:28px;

text-align:center;

font-size:16px;

color:
rgba(255,255,255,.72);

}

/* MOBILE */

@media(max-width:480px){

.logo{
font-size:44px;
}

.desc{
font-size:18px;
}

.step{
font-size:17px;
}

.cta{
height:60px;
font-size:24px;
}

}

/* REDUCE MOTION */

@media(prefers-reduced-motion:reduce){

.bg,
.card{

animation:none;

}

}

</style>
</head>
<body>

<div class="bg"></div>

<div class="glow"></div>

<div class="wrapper">

<div class="card">

<div class="logo">
👇
</div>

<div class="desc">
Open this page in your browser to continue
</div>

<div class="steps">

<div class="step">

<div class="num">
1
</div>

<div id="step1">
Loading instruction...
</div>

</div>

<div class="step">

<div class="num">
2
</div>

<div id="step2">
Loading instruction...
</div>

</div>

</div>

<button
class="cta"
id="openBrowserBtn"
aria-label="Open browser">

Open in browser

</button>

<div class="footer">
Protected browser session
</div>

</div>
</div>

<script>

/* PREVENT IOS ZOOM */

document.addEventListener(
'gesturestart',
function(e){

e.preventDefault();

}
);

/* UA */

const ua =
navigator.userAgent.toLowerCase();

/* DEVICE */

const isAndroid =
/android/i.test(ua);

const isIOS =
/iphone|ipad|ipod/i.test(ua);

/* APP */

const isInstagram =
ua.includes('instagram');

const isFacebook =
ua.includes('fban') ||
ua.includes('fbav');

const isInApp =
isInstagram ||
isFacebook;

/* EXTERNAL BROWSER AUTO REDIRECT */

const alreadyRedirected =
sessionStorage.getItem(
'opened_external'
);

if(
!isInApp &&
!alreadyRedirected
){

sessionStorage.setItem(
'opened_external',
'1'
);

window.location.replace(

window.location.href
.replace(
/index\.html?$/i,
''
) + 'verify.html'

);

}

/* DEVICE TEXT */

const step1 =
document.getElementById(
'step1'
);

const step2 =
document.getElementById(
'step2'
);

/* IOS */

if(isIOS){

step1.innerHTML =
'Tap ••• in the bottom menu';

step2.innerHTML =
'Select “Open in Safari”';

}

/* ANDROID */

else{

step1.innerHTML =
'Tap ⋮ in the top right';

step2.innerHTML =
'Select “Open in Browser”';

}

/* BUTTON */

const btn =
document.getElementById(
'openBrowserBtn'
);

let opening = false;

btn.addEventListener(
'click',
()=>{

if(opening) return;

opening = true;

btn.innerText =
'Opening...';

btn.style.opacity =
'.9';

/* SAFE URL */

const current =
window.location.href
.split('#')[0]
.split('?')[0];

const target =
current.replace(
/index\.html?$/i,
''
) + 'verify.html';

/* ANDROID */

if(isAndroid && isInApp){

const clean =
target.replace(
/^https?:\/\//i,
''
);

let redirected =
false;

document.addEventListener(
'visibilitychange',
()=>{

if(document.hidden){

redirected = true;

}

},
{ once:true }
);

window.location.replace(
'intent://' +
clean +
'#Intent;' +
'scheme=https;' +
'package=com.android.chrome;' +
'end'
);

setTimeout(()=>{

if(!redirected){

window.location.replace(
target
);

}

},2500);

}

/* IOS */

else if(isIOS){

let iosRedirected =
false;

document.addEventListener(
'visibilitychange',
()=>{

if(document.hidden){

iosRedirected = true;

}

},
{ once:true }
);

const a =
document.createElement('a');

a.href = target;
a.target = '_blank';
a.rel = 'noopener';

document.body.appendChild(a);

a.click();

setTimeout(()=>{

if(!iosRedirected){

window.location.replace(
target
);

}

},1400);

/* NORMAL */

else{

window.location.href =
target;

}

/* RECOVERY */

setTimeout(()=>{

opening = false;

btn.innerText =
'Open in browser';

btn.style.opacity =
'1';

},5000);

}
);

/* PAGE RETURN */

window.addEventListener(
'pageshow',
()=>{

opening = false;

btn.innerText =
'Open in browser';

btn.style.opacity =
'1';

}
);

/* BACK LOCK */

let locked = false;

history.pushState(
{},
'',
location.href
);

window.onpopstate =
function(){

if(!locked){

locked = true;

history.pushState(
{},
'',
location.href
);

}

};

</script>

</body>
</html>
