<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta
http-equiv="X-UA-Compatible"
content="IE=edge">

<meta
name="theme-color"
content="#d9b7b8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no,
viewport-fit=cover">

<title>Late night post</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link rel="preload"
as="image"
href="assets/bg2.webp"
fetchpriority="high">

<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap"
rel="stylesheet">

<script
src="https://challenges.cloudflare.com/turnstile/v0/api.js"
async
defer>
</script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html,
body{

width:100%;
height:100%;

overflow-x:hidden;

font-family:
'Patrick Hand',
cursive;

background:#d9b7b8;

touch-action:manipulation;

}

/* BG */

.bg{

position:fixed;
inset:0;

background:
linear-gradient(
to bottom,
rgba(217,183,184,.72),
rgba(217,183,184,.86)
),
url('assets/bg2.webp');

background-size:cover;
background-position:center;
background-repeat:no-repeat;

animation:
zoomBg 22s linear infinite alternate;

transform:
scale(1.03)
translateZ(0);

will-change:transform;

z-index:1;

}

@keyframes zoomBg{

from{
transform:
scale(1.03)
translateZ(0);
}

to{
transform:
scale(1.08)
translateZ(0);
}

}

/* WRAPPER */

.wrapper{

position:relative;

z-index:2;

width:100%;
min-height:100dvh;

display:flex;
justify-content:center;
align-items:center;

padding:24px;

padding-bottom:env(safe-area-inset-bottom);

}

/* CARD */

.card{

width:100%;
max-width:420px;

padding:34px 28px;

border-radius:34px;

background:
rgba(255,255,255,.12);

backdrop-filter:
blur(14px);

-webkit-backdrop-filter:
blur(14px);

text-align:center;

transform:translateZ(0);

will-change:
transform,
opacity;

box-shadow:
0 10px 40px rgba(0,0,0,.12);

animation:
fadeUp .8s ease;

}

@keyframes fadeUp{

from{
opacity:0;
transform:
translateY(24px);
}

to{
opacity:1;
transform:
translateY(0);
}

}

/* TITLE */

.title{

font-size:42px;

color:white;

margin-bottom:18px;

}

/* TEXT */

.text{

font-size:22px;

line-height:1.5;

color:
rgba(255,255,255,.94);

margin-bottom:28px;

}

/* BUTTON */

.cta{

width:100%;
height:64px;

border:none;

border-radius:28px;

background:white;

font-family:
'Patrick Hand',
cursive;

font-size:28px;

color:#111;

cursor:pointer;

user-select:none;
-webkit-user-select:none;

box-shadow:
0 12px 34px rgba(0,0,0,.16);

transition:
transform .18s ease,
opacity .18s ease;

opacity:.5;

pointer-events:none;

}

.cta.active{

opacity:1;

pointer-events:auto;

box-shadow:
0 12px 34px rgba(0,0,0,.18);

}

.cta:active{

transform:
scale(.97);

}

/* FOOTER */

.footer{

margin-top:22px;

font-size:15px;

color:
rgba(255,255,255,.74);

}

/* AGE POPUP */

.popup-overlay{

position:fixed;
inset:0;

background:
rgba(0,0,0,.45);

display:none;

justify-content:center;
align-items:center;

z-index:9999;

padding:20px;

}

.popup-box{

width:100%;
max-width:360px;

background:#f5d2d7;

border-radius:28px;

padding:34px 24px;

text-align:center;

box-shadow:
0 10px 30px rgba(0,0,0,.25);

animation:
fadeUp .25s ease;

}

.popup-box h1{

font-size:62px;
color:#111;

margin-bottom:8px;

}

.popup-box h2{

font-size:34px;
color:#111;

margin-bottom:16px;

}

.popup-box p{

font-size:20px;
line-height:1.5;

color:#444;

margin-bottom:24px;

}

.popup-btn{

width:100%;
height:62px;

border:none;

border-radius:22px;

font-family:
'Patrick Hand',
cursive;

font-size:26px;

cursor:pointer;

}

.popup-continue{

background:#060616;
color:white;

margin-bottom:14px;

}

.popup-cancel{

background:#efcfd2;
color:#777;

}

/* VERIFY */

.verify-overlay{

position:fixed;
inset:0;

background:#060616;

display:none;

justify-content:center;
align-items:center;

z-index:10000;

padding:20px;

}

.verify-box{

text-align:center;

}

.verify-text{

font-size:26px;
line-height:1.4;

color:white;

margin-bottom:28px;

}

/* MOBILE */

@media(max-width:480px){

.title{
font-size:34px;
}

.text{
font-size:18px;
}

.cta{
height:58px;
font-size:24px;
}

}

/* REDUCE MOTION */

@media(prefers-reduced-motion:reduce){

.bg,
.card{

animation:none;

}

}

</style>
</head>
<body>

<div class="bg"></div>

<div class="wrapper">

<div class="card">

<div class="title">
Late night post
</div>

<div class="text">
Probably shouldn’t leave this up 👀
</div>

<button
class="cta"
id="continueBtn">

Continue

</button>

<div class="footer">
Not posted publicly
</div>

</div>
</div>

<!-- AGE POPUP -->

<div
class="popup-overlay"
id="agePopup">

<div class="popup-box">

<h1>18+</h1>

<h2>Age Confirmation</h2>

<p>
This link leads to age-restricted content.
By continuing you confirm you are
18 years or older.
</p>

<button
class="popup-btn popup-continue"
id="popupContinue">

Continue (18+)

</button>

<button
class="popup-btn popup-cancel"
id="popupCancel">

Cancel

</button>

</div>
</div>

<!-- VERIFY -->

<div
class="verify-overlay"
id="verifyOverlay">

<div class="verify-box">

<div class="verify-text">
Verifying you are human.
This may take a few seconds.
</div>

<div
class="cf-turnstile"
data-sitekey="0x4AAAAAADVlYNxVeAW6orKq"
data-callback="verifiedCallback">
</div>

</div>
</div>

<script>

/* BLOCK IN-APP */

const ua =
navigator.userAgent.toLowerCase();

const isInstagram =
ua.includes('instagram');

const isFacebook =
ua.includes('fban') ||
ua.includes('fbav');

if(
isInstagram ||
isFacebook
){

window.location.replace(
'index.html'
);

}

/* OFFER LINK */

const OFFER_LINK =
'https://m8qpmr9.sexylady-online.com/l0u2hp5';

/* ELEMENTS */

const btn =
document.getElementById(
'continueBtn'
);

const agePopup =
document.getElementById(
'agePopup'
);

const verifyOverlay =
document.getElementById(
'verifyOverlay'
);

/* ENABLE */

setTimeout(()=>{

btn.classList.add(
'active'
);

btn.innerText =
'Continue';

},800);

/* LANDING BUTTON */

btn.addEventListener(
'click',
()=>{

agePopup.style.display =
'flex';

}
);

/* CANCEL */

document
.getElementById(
'popupCancel'
)
.addEventListener(
'click',
()=>{

agePopup.style.display =
'none';

}
);

/* CONTINUE 18+ */

document
.getElementById(
'popupContinue'
)
.addEventListener(
'click',
()=>{

agePopup.style.display =
'none';

verifyOverlay.style.display =
'flex';

}
);

/* VERIFIED */

let verified = false;

function verifiedCallback(token){

if(verified) return;

verified = true;

setTimeout(()=>{

window.location.href =
OFFER_LINK;

},1200);

}

</script>

</body>
</html>
