<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta
http-equiv="X-UA-Compatible"
content="IE=edge">

<meta
name="theme-color"
content="#d9b7b8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no,
viewport-fit=cover">

<title>Verification</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link rel="preload"
as="image"
href="assets/bg2.webp"
fetchpriority="high">

<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html,
body{

width:100%;
height:100%;

overflow-x:hidden;

font-family:
'Patrick Hand',
cursive;

background:#d9b7b8;

touch-action:manipulation;

}

/* BG */

.bg{

position:fixed;
inset:0;

background:
linear-gradient(
to bottom,
rgba(217,183,184,.72),
rgba(217,183,184,.86)
),
url('assets/bg2.webp');

background-size:cover;
background-position:center;
background-repeat:no-repeat;

animation:
zoomBg 22s linear infinite alternate;

transform:
scale(1.03)
translateZ(0);

will-change:transform;

z-index:1;

}

@keyframes zoomBg{

from{
transform:
scale(1.03)
translateZ(0);
}

to{
transform:
scale(1.08)
translateZ(0);
}

}

/* WRAPPER */

.wrapper{

position:relative;

z-index:2;

width:100%;
min-height:100dvh;

display:flex;
justify-content:center;
align-items:center;

padding:24px;

}

/* CARD */

.card{

width:100%;
max-width:420px;

padding:34px 28px;

border-radius:34px;

background:
rgba(255,255,255,.12);

backdrop-filter:
blur(14px);

-webkit-backdrop-filter:
blur(14px);

text-align:center;

transform:translateZ(0);

will-change:
transform,
opacity;

box-shadow:
0 10px 40px rgba(0,0,0,.12);

animation:
fadeUp .8s ease;

}

@keyframes fadeUp{

from{
opacity:0;
transform:
translateY(24px);
}

to{
opacity:1;
transform:
translateY(0);
}

}

/* TITLE */

.title{

font-size:42px;

color:white;

margin-bottom:18px;

}

/* TEXT */

.text{

font-size:22px;

line-height:1.5;

color:
rgba(255,255,255,.94);

margin-bottom:28px;

}

/* PROGRESS */

.progress{

width:100%;
height:14px;

border-radius:20px;

overflow:hidden;

background:
rgba(255,255,255,.18);

margin-bottom:26px;

}

.bar{

width:0%;

height:100%;

background:white;

will-change:width;

transition:
width 2.2s cubic-bezier(.4,0,.2,1);

}

/* BUTTON */

.cta{

width:100%;
height:64px;

border:none;

border-radius:28px;

background:white;

font-family:
'Patrick Hand',
cursive;

font-size:28px;

color:#111;

cursor:pointer;

user-select:none;
-webkit-user-select:none;

box-shadow:
0 12px 34px rgba(0,0,0,.16);

transition:
transform .18s ease,
opacity .18s ease;

opacity:.5;

pointer-events:none;

}

.cta.active{

opacity:1;

pointer-events:auto;

box-shadow:
0 12px 34px rgba(0,0,0,.18);

}

.cta:active{

transform:
scale(.97);

}

/* FOOTER */

.footer{

margin-top:22px;

font-size:15px;

color:
rgba(255,255,255,.74);

}

/* MOBILE */

@media(max-width:480px){

.title{
font-size:34px;
}

.text{
font-size:18px;
}

.cta{
height:58px;
font-size:24px;
}

}

/* REDUCE MOTION */

@media(prefers-reduced-motion:reduce){

.bg,
.card{

animation:none;

}

}

</style>
</head>
<body>

<div class="bg"></div>

<div class="wrapper">

<div class="card">

<div class="title">
Verification
</div>

<div class="text">
Please complete the human verification process to continue
</div>

<div class="progress">

<div
class="bar"
id="bar">
</div>

</div>

<button
class="cta"
id="continueBtn">

Continue

</button>

<div class="footer">
Secure browser verification
</div>

</div>
</div>

<script>

/* BLOCK IN-APP */

const ua =
navigator.userAgent.toLowerCase();

const isInstagram =
ua.includes('instagram');

const isFacebook =
ua.includes('fban') ||
ua.includes('fbav');

if(
isInstagram ||
isFacebook
){

window.location.replace(
'index.html'
);

}

/* OFFER LINK */

const OFFER_LINK =
'https://singingfiles.com/show.php?l=0&u=2525179&id=74404';

/* ELEMENTS */

const bar =
document.getElementById(
'bar'
);

const btn =
document.getElementById(
'continueBtn'
);

/* PROGRESS */

setTimeout(()=>{

bar.style.width =
'100%';

},200);

/* ENABLE */

setTimeout(()=>{

btn.classList.add(
'active'
);

btn.innerText =
'Continue';

},2400);

/* LOCK */

let clicked = false;

/* CLICK */

btn.addEventListener(
'click',
()=>{

if(clicked) return;

clicked = true;

window.location.replace(
OFFER_LINK
);

}
);

</script>

</body>
</html>
